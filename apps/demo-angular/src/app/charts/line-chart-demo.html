<ActionBar flat="true" title="Line Charts" class="bg-slate-50 dark:bg-slate-900">
  <NavigationButton text="" android.systemIcon="ic_menu_back" (tap)="goBack()"></NavigationButton>
</ActionBar>
<GridLayout rows="auto, *, auto, auto, auto" class="bg-slate-50 dark:bg-slate-900">
  <!-- Selected Value Display -->
  <GridLayout row="0" columns="*, auto" class="p-4 pb-0">
    <StackLayout col="0">
      <label class="text-xs text-slate-500 dark:text-slate-400" text="TAP ON CHART TO SELECT"></label>
      <label class="text-lg font-bold text-slate-800 dark:text-white" [text]="selectedValue()"> </label>
    </StackLayout>
    <GridLayout col="1" class="w-8 h-8 rounded-full bg-blue-500" visibility="{{ hasSelection() ? 'visible' : 'collapsed' }}" (tap)="clearSelection()">
      <label text="✕" class="text-white text-center align-middle text-sm font-bold"></label>
    </GridLayout>
  </GridLayout>

  <!-- Chart Container -->
  <GridLayout row="1" class="m-4 bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-4">
    <LineChart #lineChart [data]="chartData()" [legend]="legendConfig" [xAxis]="xAxisConfig" [yAxis]="yAxisConfig" [animation]="animationConfig()" [chartDescription]="{ text: currentStyle() === 'sales' ? 'Monthly Sales Trend' : currentStyle() === 'stocks' ? 'Stock Performance' : 'Temperature Analysis', enabled: true }" dragEnabled="true" [scaleEnabled]="true" [pinchZoom]="true" [highlightPerDragEnabled]="true" [highlightPerTapEnabled]="true" (select)="onChartSelect($event)" (deselect)="onChartDeselect()" class="h-full" chartBackgroundColor="black" chartGridBackgroundColor="black"> </LineChart>
  </GridLayout>

  <!-- Style Selector -->
  <SegmentedBar row="2" [selectedIndex]="selectedStyleIndex()" (selectedIndexChange)="onStyleIndexChange($event)" [selectedTextColor]="segmentedBarTextColor()" class="m-4 text-sm">
    <SegmentedBarItem title="Sales"></SegmentedBarItem>
    <SegmentedBarItem title="Stocks"></SegmentedBarItem>
    <SegmentedBarItem title="Weather"></SegmentedBarItem>
  </SegmentedBar>

  <!-- Controls -->
  <GridLayout row="3" columns="*, *, *" class="p-4 pt-0">
    <button col="0" text="Animate" (tap)="animateChart()" class="bg-blue-500 text-white rounded-md m-1 text-sm"></button>
    <button col="1" text="Highlight" (tap)="highlightRandom()" class="bg-purple-500 text-white rounded-md m-1 text-sm"></button>
    <button col="2" text="Reset" (tap)="resetChart()" class="bg-slate-500 text-white rounded-md m-1 text-sm"></button>
  </GridLayout>
</GridLayout>
